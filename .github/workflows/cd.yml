name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t ecommerce-api:${{ github.sha }} .
      - name: Build Web image
        run: docker build -f docker/web.Dockerfile -t ecommerce-web:${{ github.sha }} .
      - name: Validate compose config
        run: docker compose config

  deploy-staging:
    needs: build-images
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ vars.CD_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Stop before unconfigured deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_SSH_KEY" ] || [ -z "$DEPLOY_PATH" ]; then
            echo "CD_DEPLOY_ENABLED=true but DEPLOY_HOST/DEPLOY_USER/DEPLOY_SSH_KEY/DEPLOY_PATH is missing."
            exit 1
          fi
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -eu
            cd "${{ vars.DEPLOY_PATH }}"
            git fetch --all --prune
            git checkout "${{ github.sha }}"
            docker compose pull || true
            docker compose --profile backup run --rm postgres-backup
            docker compose --profile migration run --rm migrate
            docker compose up -d --build api worker web
            docker compose --profile edge up -d caddy
            docker compose ps
